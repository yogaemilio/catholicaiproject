    <h1>Quotes</h1>
    <p class="quotes-intro">These are quotes that I have found interesting and helpful. I hope that these words offer insight, encouragement, and thoughtful perspectives on the relationship between artificial intelligence and faith.</p>
    <figure class="quote">
      <blockquote>
        <p>Each of us possesses an irreplaceable and inimitable vocation, that originates from our own lived experience and becomes manifest through interaction with others. // If we fail in this task of preservation, digital technology threatens to alter radically some of the fundamental pillars of human civilization that at times are taken for granted.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Leo XIV</span>, <a href="https://www.vatican.va/content/leo-xiv/en/messages/communications/documents/20260124-messaggio-comunicazioni-sociali.html" class="document" target="_blank">Message of His Holiness Pope Leo XIV for the 60th World Day of Social Communications</a> (24 January 2026)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Although AI can provide support and assistance in managing tasks related to communication, in the long run, choosing to evade the effort of thinking for ourselves and settling for artificial statistical compilations threatens to diminish our cognitive, emotional and communication skills.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Leo XIV</span>, <a href="https://www.vatican.va/content/leo-xiv/en/messages/communications/documents/20260124-messaggio-comunicazioni-sociali.html" class="document" target="_blank">Message of His Holiness Pope Leo XIV for the 60th World Day of Social Communications</a> (24 January 2026)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>The task laid before us is not to stop digital innovation, but rather to guide it and to be aware of its ambivalent nature. It is up to each of us to raise our voice in defense of human persons, so that we can truly assimilate these tools as allies.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Leo XIV</span>, <a href="https://www.vatican.va/content/leo-xiv/en/messages/communications/documents/20260124-messaggio-comunicazioni-sociali.html" class="document" target="_blank">Message of His Holiness Pope Leo XIV for the 60th World Day of Social Communications</a> (24 January 2026)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>There is no doubt that technological development has brought, and continues to bring, significant benefits to humanity, particularly in the fields of medicine and health. In order to ensure true progress, it is imperative that human dignity and the common good remain resolute priorities for all, both individuals and public entities.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Leo XIV</span>, <a href="https://www.vatican.va/content/leo-xiv/en/messages/pont-messages/2025/documents/20251107-messaggio-ai-medicine.html" class="document" target="_blank">Message of His Holiness Pope Leo XIV to Participants in the International Congress of the Pontifical Academy for Life “AI and Medicine: The Challenge of Human Dignity”</a> (7 November 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>In this regard, I wish to note that artificial intelligence, like all human invention, springs from the creative capacity that God has entrusted to us (cf. Antiqua et Nova, 37). This means that technological innovation can be a form of participation in the divine act of creation. As such, it carries an ethical and spiritual weight, for every design choice expresses a vision of humanity. The Church therefore calls all builders of AI to cultivate moral discernment as a fundamental part of their work — to develop systems that reflect justice, solidarity, and a genuine reverence for life.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Leo XIV</span>, <a href="https://www.vatican.va/content/leo-xiv/en/messages/pont-messages/2025/documents/20251103-messaggio-builders-aiforum.html" class="document" target="_blank">Message of the Holy Father to the Participants in the Builders AI Forum</a> (3 November 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Humanity is at a crossroads, facing the immense potential generated by the digital revolution driven by Artificial Intelligence. The impact of this revolution is far-reaching, transforming areas such as education, work, art, healthcare, governance, the military, and communication. This epochal transformation requires responsibility and discernment to ensure that AI is developed and utilized for the common good, building bridges of dialogue and fostering fraternity, and ensuring it serves the interests of humanity as a whole.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Cardinal Pietro Parolin</span>,
        <a href="https://www.vatican.va/content/leo-xiv/en/messages/pont-messages/2025/documents/20250708-messaggio-aiforgood-ginevra.html" class="document" target="_blank">
          Message of the Holy Father, signed by Cardinal Pietro Parolin, on the occasion of the AI for Good Summit 2025
        </a> (10 July 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>In fact, while AI can simulate aspects of human reasoning and perform specific tasks with incredible speed and efficiency, it cannot replicate moral discernment or the ability to form genuine relationships. Therefore, the development of such technological advancements must go hand in hand with respect for human and social values, the capacity to judge with a clear conscience, and growth in human responsibility.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Cardinal Pietro Parolin</span>,
        <a href="https://www.vatican.va/content/leo-xiv/en/messages/pont-messages/2025/documents/20250708-messaggio-aiforgood-ginevra.html" class="document" target="_blank">
          Message of the Holy Father, signed by Cardinal Pietro Parolin, on the occasion of the AI for Good Summit 2025
        </a> (10 July 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Although responsibility for the ethical use of AI systems begins with those who develop, manage and oversee them, those who use them also share in this responsibility. AI therefore requires proper ethical management and regulatory frameworks centered on the human person, and which goes beyond the mere criteria of utility or efficiency.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Cardinal Pietro Parolin</span>,
        <a href="https://www.vatican.va/content/leo-xiv/en/messages/pont-messages/2025/documents/20250708-messaggio-aiforgood-ginevra.html" class="document" target="_blank">
          Message of the Holy Father, signed by Cardinal Pietro Parolin, on the occasion of the AI for Good Summit 2025
        </a> (10 July 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Ultimately, we must never lose sight of the common goal of contributing to that “tranquillitas ordinis – the tranquility of order”, as Saint Augustine called it (De Civitate Dei) and fostering a more humane order of social relations, and peaceful and just societies in the service of integral human development and the good of the human family.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Cardinal Pietro Parolin</span>,
        <a href="https://www.vatican.va/content/leo-xiv/en/messages/pont-messages/2025/documents/20250708-messaggio-aiforgood-ginevra.html" class="document" target="_blank">
          Message of the Holy Father, signed by Cardinal Pietro Parolin, on the occasion of the AI for Good Summit 2025
        </a> (10 July 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Our personal life has greater value than any algorithm, and social relationships require spaces for development that far transcend the limited patterns that any soulless machine can pre-package.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Leo XIV</span>, <a href="https://www.vatican.va/content/leo-xiv/en/speeches/2025/june/documents/20250621-giubileo-governanti.html" class="document" target="_blank">Address of Pope Leo XIV to Members of the International Inter-Parliamentary Union</a> (21 June 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Sensing myself called to continue in this same path, I chose to take the name Leo XIV. There are different reasons for this, but mainly because Pope Leo XIII in his historic Encyclical Rerum Novarum addressed the social question in the context of the first great industrial revolution. In our own day, the Church offers to everyone the treasury of her social teaching in response to another industrial revolution and to developments in the field of artificial intelligence that pose new challenges for the defence of human dignity, justice and labour.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Leo XIV</span>, <a href="https://www.vatican.va/content/leo-xiv/en/speeches/2025/may/documents/20250510-collegio-cardinalizio.html" class="document" target="_blank">Address of His Holiness Pope Leo XIV to the College of Cardinals</a> (10 May 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>There is, however, the risk that AI will be used to advance the “technocratic paradigm”, which perceives all the world’s problems as solvable through technological means alone. Within this paradigm, human dignity and fraternity are frequently subordinated in the pursuit of efficiency, as though reality, goodness, and truth inherently emanate from technological and economic power.  Yet human dignity must never be violated for the sake of efficiency. Technological developments that do not improve life for everyone, but instead create or worsen inequalities and conflicts, cannot be called true progress. For this reason, AI should be placed at the service of a healthier, more human, more social and more integral development.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/messages/pont-messages/2025/documents/20250114-messaggio-world-economic-forum.html" class="document" target="_blank">Message of the Holy Father to the World Economic Forum 2025</a> (14 January 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Although advanced AI systems can “learn” through processes such as machine learning, this sort of training is fundamentally different from the developmental growth of human intelligence, which is shaped by embodied experiences, including sensory input, emotional responses, social interactions, and the unique context of each moment. These elements shape and form individuals within their personal history.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Dicastery for the Doctrine of the Faith &amp; Dicastery for Culture and Education</span>,
        <a href="https://www.vatican.va/roman_curia/congregations/cfaith/documents/rc_ddf_doc_20250128_antiqua-et-nova_en.html" class="document" target="_blank">
          Antiqua et Nova: Note on the Relationship Between Artificial Intelligence and Human Intelligence
        </a> (14 January 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Consequently, although AI can simulate aspects of human reasoning and perform specific tasks with incredible speed and efficiency, its computational abilities represent only a fraction of the broader capacities of the human mind.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Dicastery for the Doctrine of the Faith &amp; Dicastery for Culture and Education</span>,
        <a href="https://www.vatican.va/roman_curia/congregations/cfaith/documents/rc_ddf_doc_20250128_antiqua-et-nova_en.html" class="document" target="_blank">
          Antiqua et Nova: Note on the Relationship Between Artificial Intelligence and Human Intelligence
        </a> (14 January 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>For instance, AI cannot currently replicate moral discernment or the ability to establish authentic relationships.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Dicastery for the Doctrine of the Faith &amp; Dicastery for Culture and Education</span>,
        <a href="https://www.vatican.va/roman_curia/congregations/cfaith/documents/rc_ddf_doc_20250128_antiqua-et-nova_en.html" class="document" target="_blank">
          Antiqua et Nova: Note on the Relationship Between Artificial Intelligence and Human Intelligence
        </a> (14 January 2025)
      </figcaption>
    </figure>

    <figure class="quote">
      <blockquote>
        <p>Moreover, human intelligence is situated within a personally lived history of intellectual and moral formation that fundamentally shapes the individual’s perspective, encompassing the physical, emotional, social, moral, and spiritual dimensions of life.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Dicastery for the Doctrine of the Faith &amp; Dicastery for Culture and Education</span>,
        <a href="https://www.vatican.va/roman_curia/congregations/cfaith/documents/rc_ddf_doc_20250128_antiqua-et-nova_en.html" class="document" target="_blank">
          Antiqua et Nova: Note on the Relationship Between Artificial Intelligence and Human Intelligence
        </a> (14 January 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Human intelligence is not primarily about completing functional tasks but about understanding and actively engaging with reality in all its dimensions; it is also capable of surprising insights. Since AI lacks the richness of corporeality, relationality, and the openness of the human heart to truth and goodness, its capacities—though seemingly limitless—are incomparable with the human ability to grasp reality. So much can be learned from an illness, an embrace of reconciliation, and even a simple sunset; indeed, many experiences we have as humans open new horizons and offer the possibility of attaining new wisdom.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Dicastery for the Doctrine of the Faith &amp; Dicastery for Culture and Education</span>,
        <a href="https://www.vatican.va/roman_curia/congregations/cfaith/documents/rc_ddf_doc_20250128_antiqua-et-nova_en.html" class="document" target="_blank">
          Antiqua et Nova: Note on the Relationship Between Artificial Intelligence and Human Intelligence
        </a> (14 January 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>So much can be learned from an illness, an embrace of reconciliation, and even a simple sunset; indeed, many experiences we have as humans open new horizons and offer the possibility of attaining new wisdom.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Dicastery for the Doctrine of the Faith &amp; Dicastery for Culture and Education</span>,
        <a href="https://www.vatican.va/roman_curia/congregations/cfaith/documents/rc_ddf_doc_20250128_antiqua-et-nova_en.html" class="document" target="_blank">
          Antiqua et Nova: Note on the Relationship Between Artificial Intelligence and Human Intelligence
        </a> (14 January 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>No device, working solely with data, can measure up to these and countless other experiences present in our lives.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Dicastery for the Doctrine of the Faith &amp; Dicastery for Culture and Education</span>,
        <a href="https://www.vatican.va/roman_curia/congregations/cfaith/documents/rc_ddf_doc_20250128_antiqua-et-nova_en.html" class="document" target="_blank">
          Antiqua et Nova: Note on the Relationship Between Artificial Intelligence and Human Intelligence
        </a> (14 January 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Between a machine and a human being, only the latter is truly a moral agent—a subject of moral responsibility who exercises freedom in his or her decisions and accepts their consequences.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Dicastery for the Doctrine of the Faith &amp; Dicastery for Culture and Education</span>,
        <a href="https://www.vatican.va/roman_curia/congregations/cfaith/documents/rc_ddf_doc_20250128_antiqua-et-nova_en.html" class="document" target="_blank">
          Antiqua et Nova: Note on the Relationship Between Artificial Intelligence and Human Intelligence
        </a> (14 January 2025)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Science and technology are therefore brilliant products of the creative potential of human beings. // Indeed, artificial intelligence arises precisely from the use of this God-given creative potential.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/speeches/2024/june/documents/20240614-g7-intelligenza-artificiale.html" class="document" target="_blank">Address of His Holiness Pope Francis at the G7 Session on Artificial Intelligence</a> (14 June 2024)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>At this time in history, which risks becoming rich in technology and poor in humanity, our reflections must begin with the human heart. Only by adopting a spiritual way of viewing reality, only by recovering a wisdom of the heart, can we confront and interpret the newness of our time and rediscover the path to a fully human communication.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/messages/communications/documents/20240124-messaggio-comunicazioni-sociali.html" class="document" target="_blank">Message of His Holiness Pope Francis for the 58th World Day of Social Communications</a> (24 January 2024)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>No doubt, machines possess a limitlessly greater capacity than human beings for storing and correlating data, but human beings alone are capable of making sense of that data. It is not simply a matter of making machines appear more human, but of awakening humanity from the slumber induced by the illusion of omnipotence, based on the belief that we are completely autonomous and self-referential subjects, detached from all social bonds and forgetful of our status as creatures.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/messages/communications/documents/20240124-messaggio-comunicazioni-sociali.html" class="document" target="_blank">Message of His Holiness Pope Francis for the 58th World Day of Social Communications</a> (24 January 2024)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>All of us are called to grow together, in humanity and as humanity. We are challenged to make a qualitative leap in order to become a complex, multiethnic, pluralistic, multireligious and multicultural society. We are called to reflect carefully on the theoretical development and the practical use of these new instruments of communication and knowledge. Their great possibilities for good are accompanied by the risk of turning everything into abstract calculations that reduce individuals to data, thinking to a mechanical process, experience to isolated cases, goodness to profit, and, above all, a denial of the uniqueness of each individual and his or her story.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/messages/communications/documents/20240124-messaggio-comunicazioni-sociali.html" class="document" target="_blank">Message of His Holiness Pope Francis for the 58th World Day of Social Communications</a> (24 January 2024)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Information cannot be separated from living relationships. These involve the body and immersion in the real world; they involve correlating not only data but also human experiences; they require sensitivity to faces and facial expressions, compassion and sharing.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/messages/communications/documents/20240124-messaggio-comunicazioni-sociali.html" class="document" target="_blank">Message of His Holiness Pope Francis for the 58th World Day of Social Communications</a> (24 January 2024)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>The answer we give to these questions is not pre-determined; it depends on us. It is up to us to decide whether we will become fodder for algorithms or will nourish our hearts with that freedom without which we cannot grow in wisdom. Such wisdom matures by using time wisely and embracing our vulnerabilities. It grows in the covenant between generations, between those who remember the past and who look ahead to the future. Only together can we increase our capacity for discernment and vigilance and for seeing things in the light of their fulfilment. Lest our humanity lose its bearings, let us seek the wisdom that was present before all things (cf. Sir 1:4): it will help us also to put systems of artificial intelligence at the service of a fully human communication.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/messages/communications/documents/20240124-messaggio-comunicazioni-sociali.html" class="document" target="_blank">Message of His Holiness Pope Francis for the 58th World Day of Social Communications</a> (24 January 2024)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>This should lead us to reflect on something frequently overlooked in our current technocratic and efficiency-oriented mentality, as it is decisive for personal and social development: the “sense of limit”. Human beings are, by definition, mortal; by proposing to overcome every limit through technology, in an obsessive desire to control everything, we risk losing control over ourselves; in the quest for an absolute freedom, we risk falling into the spiral of a “technological dictatorship”. Recognizing and accepting our limits as creatures is an indispensable condition for reaching, or better, welcoming fulfilment as a gift. In the ideological context of a technocratic paradigm inspired by a Promethean presumption of self-sufficiency, inequalities could grow out of proportion, knowledge and wealth accumulate in the hands of a few, and grave risks ensue for democratic societies and peaceful coexistence.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/messages/peace/documents/20231208-messaggio-57giornatamondiale-pace2024.html" class="document" target="_blank">Message of His Holiness Pope Francis for the 57th World Day of Peace</a> (1 January 2024)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Fundamental respect for human dignity demands that we refuse to allow the uniqueness of the person to be identified with a set of data. Algorithms must not be allowed to determine how we understand human rights, to set aside the essential human values of compassion, mercy and forgiveness, or to eliminate the possibility of an individual changing and leaving his or her past behind.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/messages/peace/documents/20231208-messaggio-57giornatamondiale-pace2024.html" class="document" target="_blank">Message of His Holiness Pope Francis for the 57th World Day of Peace</a> (1 January 2024)
      </figcaption>
    </figure>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>Technology is, and has been, immensely beneficial to our human family. We think, for example, of the countless advances made in the fields of medicine, engineering and communications (cf. Laudato Si’, 102). In acknowledging the practical benefits of science and technology, we also see them as evidence of the creativity of human beings and the nobility of their vocation to participate responsibly in God's creative action (cf. ibid., 131). // From this perspective, I am convinced that the development of artificial intelligence and machine learning has the potential to contribute in a positive way to the future of humanity; we cannot dismiss it.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/speeches/2023/march/documents/20230327-minerva-dialogues.html" class="document" target="_blank">Address to Participants in the Minerva Dialogues</a> (27 March 2023)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>The concept of human dignity – and this is central – requires us to recognize and respect the fact that a person’s fundamental value cannot be measured by data alone. In social and economic decision-making, we should be cautious about delegating judgements to algorithms that process data, often collected surreptitiously, on an individual’s makeup and prior behaviour. Such data can be contaminated by societal prejudices and preconceptions. A person’s past behaviour should not be used to deny him or her the opportunity to change, grow and contribute to society. We cannot allow algorithms to limit or condition respect for human dignity, or to exclude compassion, mercy, forgiveness, and above all, the hope that people are able to change.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/speeches/2023/march/documents/20230327-minerva-dialogues.html" class="document" target="_blank">Address to Participants in the Minerva Dialogues</a> (27 March 2023)
      </figcaption>
    </figure>
    <figure class="quote">
      <blockquote>
        <p>As believers, we have no ready-made ideas about how to respond to the unforeseen questions that history sets before us today. Our task is rather one of walking alongside others, listening attentively and seeking to link experience and reflection. As believers, we ought to allow ourselves to be challenged, so that the word of God and our faith tradition can help us interpret the phenomena of our world and identify paths of humanization, and thus of loving evangelization, that we can travel together. In this way we will be able to dialogue fruitfully with all those committed to human development, while keeping at the centre of knowledge and social praxis the human person in all his or her dimensions, including the spiritual. We are faced with a task involving the human family as a whole.</p>
      </blockquote>
      <figcaption>
        &mdash; <span class="author">Pope Francis</span>, <a href="https://www.vatican.va/content/francesco/en/speeches/2020/february/documents/papa-francesco_20200228_accademia-perlavita.html" class="document" target="_blank">Meeting with the Participants in the Plenary Assembly of the Pontifical Academy for Life</a> (28 February 2020)
      </figcaption>
